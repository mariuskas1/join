<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="icon" type="image/png" href="assets/img/logo_dark.png"/>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

   <div class="index-main">
        <div class="index-header-2">
            <img src="assets/img/logo_dark.png" class="index-header-logo">
            
        </div>

        <div class="sign-up">
        <img src="assets/img/arrow-left-line.png" class="return-img-sign-up" onclick="redirectTo('index.html')">
        <h2>Sign up</h2>
        <div class="log-in-underline"></div>
        <form id="sign-up-form" onsubmit="signUp(); return false">
            <div class="index-input-container">
                <img src="assets/img/person.png" class="index-input-icon" id="person-icon">
                <input type="text" placeholder="Name" id="name" class="index-input" required minlength="5">
            </div>
            <div class="index-input-container">
                <img src="assets/img/mail.png" class="index-input-icon" id="mail-icon">
                <input type="email" placeholder="Email" id="email" class="index-input" required>
            </div>
            <div class="index-input-container">
                <img src="assets/img/lock.png" class="index-input-icon" id="lock-icon">
                <input type="password" placeholder="Password" id="password" class="index-input" required minlength="6">
            </div>
            <div class="index-input-container">
                <img src="assets/img/lock.png" class="index-input-icon" id="lock-icon">
                <input type="password" placeholder="Confirm Password" id="password2" class="index-input" required minlength="6">
            </div>
           
            <div class="checkbox-container-2">
                <input type="checkbox" id="policy" name="policy" class="remember-checkbox">
                <label for="policy" class="checkbox-label">I accept the <a href="privacy_policy.html" target="_blank">Privacy Policy</a> </label>
            </div>
                
            <button class="sign-up-btn-2" type="submit" id="sign-up-btn-2" disabled>Sign up</button>

        </form>
        </div>
    
    <div class="index-link-div">
        <a href="privacy_policy.html">Privacy Policy</a>
        <a href="legal_notice.html">Legal notices</a>
    </div>

    <div class="sign-up-modal-bg d-none" id="sign-up-modal-bg">
    </div>
    <div class="sign-up-modal" id="sign-up-modal">You Signed Up successfully</div>
   </div>


   <script src="js/sign_up.js"></script>
</body>
</html>
