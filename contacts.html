<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="icon" type="image/png" href="assets/img/logo_dark.png"/>
    <link rel="stylesheet" href="style.css">
    <script src="js/templates.js"></script>
    <script src="script.js"></script>
    <script src="js/contacts.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>

<body onload="includeHTML()">

    <div w3-include-html="assets/templates/menu_template.html"></div>


        <div class="main-contacts">
            <div class="contacts-display-div">
                <button class="add-contact-btn" id="add-contact-btn" onclick="displayAddContactModal()">Add new contact <img src="assets/img/person_add.png" class="add-contact-icon"></button>
                <div id="contacts-display-bar"></div>
            </div>
            <div class="contact-display">
                <div class="contacts-display-header">
                    <h1>Contacts</h1>
                    <div class="contacts-header-bar" id="c-header-bar-desktop"></div>
                    <span class="contacts-header-span">Better with a team</span>
                    <div class="contacts-header-bar" id="c-header-bar-mobile"></div>
                </div>

                <img src="assets/img/arrow-left-line.png" class="return-arrow-contacts-mobile return-img" onclick="hideSingleContactDisplay()">

                <div class="contact-display-body" id="single-contact-display-div">
                </div>

                <div class="user-menu-bg d-none" id="scd-options-menu" onclick="closeScdOptionsMobile()">
                    <div class="scd-options-menu">
                        <button class="scd-option-btn" onclick="displayEditContactModal()"><img src="assets/img/edit.png"> Edit</button>
                        <button class="scd-option-btn" onclick="deleteContact()"><img src="assets/img/delete.png"> Delete</button>
                    </div>
                </div>
            </div>

            <button class="add-contact-btn-mobile" id="addContactBtnMobile" onclick="displayAddContactModal()"><img src="assets/img/person_add.png" id="mobileContactOptionsBtn"></button>
            
        </div>

        <div id="contact-added-confirmation">Contact successfully created</div>

        <div class="add-contact-modal-bg display-none" id="add-contact-modal" onclick="hideAddContactModal()">
            <div class="add-contact-modal" onclick="event.stopPropagation()" id="inner-add-contact-modal">
                <div class="add-contact-modal-left">
                    <img src="assets/img/Capa 2.png" class="add-contact-modal-logo">
                    <div class="add-contact-modal-lh"><img src="assets/img/Close_white.png" onclick="hideAddContactModal()" class="close-contact-modal-icon"></div>
                    <span class="add-contact-modal-title" id="add-contact-modal-title">Add contact</span>
                    <span class="add-contact-team" id="add-contact-team">Tasks are better with a team!</span>
                    <div class="modal-bar"></div>
                </div>
                <div class="add-contact-modal-right">
                    <div class="add-contact-modal-rh"><img src="assets/img/Close2.png" onclick="hideAddContactModal()" class="close-contact-modal-icon"></div>
                    <div class="add-contact-form-div">
                        <img src="assets/img/Group 144.png" class="new-contact-img" id="contact-initials-l">
                        <form onsubmit="uploadNewContact(); return false" class="add-contact-form" id="add-contact-form">
                            <div class="index-input-container add-contact-input-container">
                                <img src="assets/img/person2.png" class="index-input-icon add-contact-icon" >
                                <input type="text" placeholder="Name" id="new-contact-name"  class="index-input add-contact-input" required minlength="5">
                            </div>
                            <div class="index-input-container">
                                <img src="assets/img/mail.png" class="index-input-icon add-contact-icon" id="mail-icon">
                                <input type="email" placeholder="Email" id="new-contact-mail"  class="index-input add-contact-input" required>
                            </div>
                            <div class="index-input-container">
                                <img src="assets/img/call.png" class="index-input-icon add-contact-icon">
                                <input type="tel" placeholder="Phone" id="new-contact-phone"  class="index-input add-contact-input" required minlength="7" pattern="^(\+|0)[0-9 ]*$" title="+49 1234 56789 / 0123456789">
                            </div>

                            <div class="add-contact-form-btns">
                                <button class="cancel-contact-btn" id="cancel-or-delete-btn" type="button" onclick="clearForm()">Cancel<img class="btn-icon" src="assets/img/close.png"></button>
                                <button class="create-contact-btn" id="create-or-save-btn"  type="submit">Create Contact<img class="btn-icon" src="assets/img/check_white.png"></button>
                            </div>

                        </form>
                
                    </div>
                </div>
            </div>
        </div>
       
        
        



</body>
</html>
